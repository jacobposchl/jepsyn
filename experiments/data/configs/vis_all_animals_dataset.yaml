# All paths below are relative to THIS config file's directory.
# experiments/data/configs/ is 3 levels below the repo root (snn-jepa/),
# so ../../../ resolves to the repo root.

# Output Parquet is written to datasets/<config_stem>.parquet at the repo root
# automatically. Override by adding: data_path: path/to/output.parquet

dataset_config:
  # Directory where AllenSDK downloads and caches session data.
  cache_dir: ../../../visual_behavior_neuropixels_data/

  # session_ids: omit (or set to []) to auto-discover all sessions that have
  # units matching brain_areas.  Provide an explicit list to override.
  # session_ids: []

  # Substring filter for brain areas: any structure whose acronym contains one
  # of these strings is included.
  brain_areas: ["VIS"]

  quality:
    min_snr: 1.0
    min_firing_rate: 0.1
    max_isi_violations: 1.0

  windowing:
    window_size_ms: 400   # ms; spikes stored as raw timestamps, no binning
